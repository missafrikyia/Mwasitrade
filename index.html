<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MwasiTrade | Studio Vocal Pro</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1A1A1A; --red: #e74c3c; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f0f0; color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--gold); }
        .subtitle { font-size: 11px; color: #666; margin-top: 5px; text-transform: uppercase; }

        .studio-card { background: white; padding: 25px; border-radius: 30px; max-width: 420px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        
        #preview { width: 100%; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 3px solid white; }
        canvas { display: none; }

        .voice-section { text-align: center; margin-bottom: 25px; position: relative; }
        .mic-btn { 
            background: var(--dark); color: white; border: none; width: 75px; height: 75px; 
            border-radius: 50%; font-size: 32px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; margin: 0 auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .mic-btn.active { background: var(--red); animation: pulse 1.2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .status-text { font-size: 13px; color: #888; margin-top: 12px; font-weight: 500; min-height: 18px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #bbb; margin-left: 5px; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }

        .btn-action { background: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Mwasi<span>Trade</span></div>
        <div class="subtitle">Propulsez votre business par la voix</div>
    </div>

    <div class="studio-card">
        <canvas id="canvas" width="1000" height="1000"></canvas>
        <img id="preview" src="" alt="Chargement du studio...">

        <div class="voice-section">
            <button class="mic-btn" id="micBtn" onclick="startVoice()">🎤</button>
            <div class="status-text" id="status">Appuyez et dites : "Pagne 5000"</div>
        </div>

        <div class="input-group">
            <label>Nom de l'article</label>
            <input type="text" id="name" placeholder="Ex: Jus de Gingembre" oninput="draw()">
        </div>

        <div class="input-group">
            <label>Prix de vente</label>
            <input type="text" id="price" placeholder="Ex: 500 FCFA" oninput="draw()">
        </div>

        <button class="btn-action" onclick="share()">COMMANDER SUR WHATSAPP</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('preview');
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');

        function draw() {
            ctx.fillStyle = "#121212";
            ctx.fillRect(0, 0, 1000, 1000);
            
            ctx.strokeStyle = "#D4AF37";
            ctx.lineWidth = 20;
            ctx.strokeRect(40, 40, 920, 920);
            ctx.lineWidth = 5;
            ctx.strokeRect(70, 70, 860, 860);

            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 80px sans-serif";
            let nameVal = document.getElementById('name').value || "VOTRE PRODUIT";
            ctx.fillText(nameVal.toUpperCase(), 500, 460);
            
            ctx.fillStyle = "#D4AF37";
            ctx.font = "900 110px sans-serif";
            let priceVal = document.getElementById('price').value || "PRIX";
            ctx.fillText(priceVal, 500, 590);

            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.font = "30px sans-serif";
            ctx.fillText("PRODUIT VIA MWASITRADE", 500, 880);

            preview.src = canvas.toDataURL();
        }

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { status.innerText = "Utilisez Chrome sur Android"; return; }

            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            micBtn.classList.add('active');
            status.innerText = "Je vous écoute...";
            recognition.start();

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase();
                status.innerText = "Entendu : " + text;
                micBtn.classList.remove('active');
                if (navigator.vibrate) navigator.vibrate(100);

                const numbers = text.match(/\d+/g); 
                if (numbers) {
                    const finalPrice = numbers[numbers.length - 1];
                    document.getElementById('price').value = finalPrice + " FCFA";
                }
                
                let namePart = text.replace(/\d+/g, '').replace(/prix|coûte|fcf|francs|cfa|est à|va/g, '').trim();
                if (namePart) {
                    document.getElementById('name').value = namePart.charAt(0).toUpperCase() + namePart.slice(1);
                }
                draw();
            };

            recognition.onerror = () => { micBtn.classList.remove('active'); status.innerText = "Réessayez."; };
        }

        function share() {
            const name = document.getElementById('name').value || "Produit";
            const price = document.getElementById('price').value || "Prix";
            
            // 1. Télécharge l'image d'abord
            const link = document.createElement('a');
            link.download = `mwasitrade-${name}.png`;
            link.href = canvas.toDataURL();
            link.click();

            // 2. Ouvre WhatsApp avec le message textuel
            // Tu peux remplacer le numéro ici par ton numéro Business final
            const message = encodeURIComponent(`Bonjour MwasiTrade ! Je souhaite commander ce produit :\n\n📦 *${name}*\n💰 *Prix : ${price}*\n\nMerci de confirmer ma commande !`);
            window.open(`https://wa.me/?text=${message}`, '_blank');
        }

        window.onload = draw;
    </script>
</body>
</html>
