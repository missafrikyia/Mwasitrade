    <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mwasia Voice-First</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --mwasia-green: #1a4d2e; --mwasia-blue: #1e3a8a; }
.nav-active { color: var(--mwasia-green) !important; font-weight: bold; border-top: 3px solid var(--mwasia-green); }
.mwasia-gradient { background: linear-gradient(135deg, #1a4d2e 0%, #1e3a8a 100%); }
.glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
</style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-gray-900">

<!-- NAV -->
<nav class="p-4 bg-white shadow-sm sticky top-0 z-50 flex justify-between items-center border-b">
  <h1 class="text-2xl font-black text-[#1a4d2e] tracking-tighter">MWASIA</h1>
  <div class="flex items-center gap-2">
    <span class="text-[9px] font-bold text-gray-400 uppercase">Souveraineté Cognitio</span>
    <i class="fas fa-shield-alt text-green-600"></i>
  </div>
</nav>

<!-- ACTIVITÉ VOICE-FIRST -->
<main id="space-activite" class="p-4 max-w-lg mx-auto space-y-6">
  <section class="bg-white p-6 rounded-[2rem] shadow-md border text-center border-t-4 border-[#1a4d2e]">
    <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Enregistrer une activité vocale</h2>
    <button id="voiceBtn" class="mwasia-gradient text-white w-20 h-20 rounded-full shadow-xl flex items-center justify-center mx-auto border-4 border-white">
      <i class="fas fa-microphone text-3xl"></i>
    </button>
    <div id="voiceStatus" class="mt-4 text-[10px] text-[#1e3a8a] font-bold italic uppercase">Clique pour parler...</div>
  </section>

  <section id="section_gen" class="bg-white p-5 rounded-[2rem] shadow-lg border-l-4 border-[#1a4d2e] opacity-40 pointer-events-none">
    <h3 class="text-xs font-bold text-gray-700 mb-4">Mon Kit de Lancement</h3>
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="flex-1 aspect-square bg-gray-50 rounded-2xl overflow-hidden border relative">
        <canvas id="carre_visuel" width="500" height="500" class="hidden"></canvas>
        <img id="img_finale" src="https://via.placeholder.com/500x500/f3f4f6/9ca3af?text=Aper%C3%A7u+Visuel" class="w-full h-full object-cover">
        <button id="downloadBtn" class="absolute bottom-2 right-2 bg-white/90 p-2 rounded-full text-[#1a4d2e] shadow-md">
          <i class="fas fa-download"></i>
        </button>
      </div>
      <div class="flex-1 flex flex-col justify-between gap-2">
        <div class="p-2 bg-green-50 rounded-lg text-[8px] text-[#1a4d2e] border border-green-100 italic" id="msg1">Prêt à générer le visuel</div>
        <div class="p-2 bg-blue-50 rounded-lg text-[8px] text-[#1e3a8a] border border-blue-100 italic" id="msg2">KPI : ventes, partages, engagement</div>
        <button id="shareBtn" class="w-full bg-[#1a4d2e] text-white py-3 rounded-xl font-bold text-[10px] flex items-center justify-center gap-2 shadow-md">
          <i class="fas fa-share-alt"></i> Partager métriques
        </button>

        <div class="grid grid-cols-2 gap-2 mt-2">
          <div class="bg-gray-100 p-2 rounded-xl text-center">
            <p class="text-[8px] text-gray-500 uppercase font-bold">Ventes cumulées</p>
            <p class="text-sm font-black text-[#1e3a8a]" id="kpi_ventes">0 FCFA</p>
          </div>
          <div class="bg-gray-100 p-2 rounded-xl text-center">
            <p class="text-[8px] text-gray-500 uppercase font-bold">Partages</p>
            <p class="text-sm font-black text-[#1a4d2e]" id="kpi_shares">0</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- FOOTER NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around items-center glass shadow-lg z-50">
  <button onclick="switchTab('activite', this)" class="nav-btn nav-active flex flex-col items-center p-2 text-[#1a4d2e]">
    <i class="fas fa-home text-sm mb-1"></i><span class="text-[8px] uppercase font-bold tracking-tighter">Activité</span>
  </button>
  <button onclick="switchTab('cercle', this)" class="nav-btn text-gray-400 flex flex-col items-center p-2">
    <i class="fas fa-users text-sm mb-1"></i><span class="text-[8px] uppercase font-bold tracking-tighter">Cercle</span>
  </button>
  <button onclick="switchTab('identite', this)" class="nav-btn text-gray-400 flex flex-col items-center p-2">
    <i class="fas fa-id-badge text-sm mb-1"></i><span class="text-[8px] uppercase font-bold tracking-tighter">Identité</span>
  </button>
  <button onclick="switchTab('finance', this)" class="nav-btn text-gray-400 flex flex-col items-center p-2">
    <i class="fas fa-coins text-sm mb-1"></i><span class="text-[8px] uppercase font-bold tracking-tighter">Banque</span>
  </button>
  <button onclick="switchTab('bp', this)" class="nav-btn text-gray-400 flex flex-col items-center p-2">
    <i class="fas fa-file-invoice text-sm mb-1"></i><span class="text-[8px] uppercase font-bold tracking-tighter">Plan</span>
  </button>
</div>

<script>
// NAV
function switchTab(tabId, element) {
  document.querySelectorAll('main').forEach(main => main.classList.add('hidden'));
  document.getElementById('space-' + tabId).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('nav-active', 'text-[#1a4d2e]');
    btn.classList.add('text-gray-400');
  });
  element.classList.add('nav-active', 'text-[#1a4d2e]');
  element.classList.remove('text-gray-400');
}

// VOICE-FIRST
let shareCount = 0;
let totalVentes = 0;
const voiceBtn = document.getElementById('voiceBtn');
const status = document.getElementById('voiceStatus');
const kpiVentes = document.getElementById('kpi_ventes');
const kpiShares = document.getElementById('kpi_shares');

voiceBtn.onclick = () => {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Votre navigateur ne supporte pas la reconnaissance vocale.");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "fr-FR";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  status.innerText = "Écoute en cours... Parlez maintenant";

  recognition.start();
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    status.innerText = `Vous avez dit : "${transcript}"`;

    // Extraction simple du montant si format "X FCFA"
    const regex = /(\d+)\s?FCFA/;
    const match = transcript.match(regex);
    if (match) {
      totalVentes += parseInt(match[1]);
      kpiVentes.innerText = totalVentes.toLocaleString() + " FCFA";
    }

    // Déverrouille section visuel
    document.getElementById('section_gen').classList.remove('opacity-40', 'pointer-events-none');

    // Dessin visuel simplifié
    const canvas = document.getElementById('carre_visuel');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#1a4d2e"; ctx.fillRect(0,0,500,500);
    ctx.fillStyle = "white"; ctx.font = "bold 40px sans-serif"; ctx.textAlign="center";
    ctx.fillText("PAGNE WAX", 250, 230);
    ctx.font = "30px sans-serif"; ctx.fillText("OFFRE MWASIA", 250, 280);
    document.getElementById('img_finale').src = canvas.toDataURL();
    document.getElementById('msg1').innerText = transcript;
  };

  recognition.onerror = (e) => { status.innerText = "Erreur reconnaissance vocale : " + e.error; }
};

// Partage métriques
document.getElementById('shareBtn').onclick = () => {
  shareCount++;
  kpiShares.innerText = shareCount;
  const text = encodeURIComponent(`Ventes cumulées : ${totalVentes.toLocaleString()} FCFA, Partages : ${shareCount}`);
  window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
};
</script>
</body>
</html>
