<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwa$ia Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mwasia-green: #1a4d2e; --mwasia-blue: #1e3a8a; }
        .mwasia-gradient { background: linear-gradient(135deg, var(--mwasia-green) 0%, var(--mwasia-blue) 100%); }
        .nav-active { color: var(--mwasia-green) !important; font-weight: bold; border-top: 3.5px solid var(--mwasia-green); }
        .recording { animation: pulse-red 1.5s infinite; background: #ef4444 !important; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-24">

    <header class="bg-white sticky top-0 z-50 border-b flex justify-between items-center p-4">
        <h1 class="text-2xl font-black text-[#1a4d2e] tracking-tighter">MWA$IA</h1>
        <div class="text-right">
            <p class="text-[7px] font-bold text-gray-400 uppercase">Partages</p>
            <p id="header_shares" class="text-xs font-black text-[#1a4d2e]">0</p>
        </div>
    </header>

    <main id="space-1" class="page p-4 max-w-lg mx-auto space-y-4">
        <section class="bg-white p-5 rounded-3xl shadow-md text-center border-t-4 border-[#1a4d2e]">
            <div id="status_1" class="bg-blue-50 p-2 rounded-xl text-[10px] text-[#1e3a8a] mb-4 min-h-[45px] flex items-center justify-center italic font-bold uppercase">
                "Dites : Produit, Prix, Ville"
            </div>
            <button id="micBtn1" class="mwasia-gradient w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-microphone text-2xl text-white"></i>
            </button>
            
            <div class="relative rounded-2xl overflow-hidden border-2 mb-4">
                <canvas id="visuelCanvas" width="600" height="600" class="hidden"></canvas>
                <img id="img_finale" src="https://via.placeholder.com/600x600/f3f4f6/9ca3af?text=En+attente+de+votre+voix..." class="w-full h-auto">
            </div>

            <div id="wa_messages" class="hidden space-y-2 mb-4 text-left">
                <div class="p-2 bg-green-50 border border-green-100 rounded-xl text-[10px]" id="msg_1"></div>
                <div class="p-2 bg-blue-50 border border-blue-100 rounded-xl text-[10px]" id="msg_2"></div>
            </div>

            <div class="flex gap-2">
                <button id="downloadBtn" class="flex-1 bg-gray-800 text-white py-4 rounded-xl font-bold text-[10px] uppercase">
                    <i class="fas fa-download"></i> Télécharger
                </button>
                <button id="shareBtn" class="flex-1 bg-[#25D366] text-white py-4 rounded-xl font-bold text-[10px] uppercase">
                    <i class="fab fa-whatsapp"></i> Partager
                </button>
            </div>
        </section>
    </main>

    <main id="space-2" class="page p-4 max-w-lg mx-auto space-y-4 hidden">
        <section class="bg-white p-6 rounded-3xl shadow-md border-t-4 border-[#1e3a8a]">
            <h2 class="font-bold text-gray-700 mb-4 text-[10px] uppercase text-center tracking-widest">Enregistrer une Vente</h2>
            <div class="flex justify-center mb-4">
                <button id="micBtn2" class="mwasia-gradient w-14 h-14 rounded-full flex items-center justify-center shadow-lg">
                    <i class="fas fa-microphone text-white text-xl"></i>
                </button>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="number" id="quantite" placeholder="Qté" class="border p-3 rounded-xl flex-1 text-center font-bold">
                <input type="number" id="prix" placeholder="Prix Unitaire" class="border p-3 rounded-xl flex-1 text-center font-bold">
            </div>
            <button id="addSaleBtn" class="w-full bg-[#1a4d2e] text-white py-3 rounded-xl font-bold uppercase text-xs">Valider</button>
            <div class="mt-6 border-t pt-4">
                <table class="w-full text-[10px]"><tbody id="salesTable" class="divide-y"></tbody></table>
                <p id="totalVentes" class="text-xl font-black text-[#1a4d2e] text-center mt-2">0 FCFA</p>
            </div>
        </section>
    </main>

    <main id="space-3" class="page hidden p-4"><div class="bg-white p-8 rounded-3xl text-center shadow">Score: A+</div></main>
    <main id="space-4" class="page hidden p-4"><div class="bg-white p-8 rounded-3xl text-center shadow">Plan Stratégique</div></main>
    <main id="space-5" class="page hidden p-4"><div class="bg-white p-8 rounded-3xl text-center shadow">Crédit: <span id="scoreFinancier">0 FCFA</span></div></main>
    <main id="space-6" class="page hidden p-4"><div class="bg-white p-8 rounded-3xl text-center shadow">Le Cercle</div></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around z-50">
        <button onclick="switchTab(1, this)" class="nav-btn nav-active flex flex-col items-center p-2 text-gray-400"><i class="fas fa-bullhorn text-xs"></i><span class="text-[7px] uppercase font-bold">Pub</span></button>
        <button onclick="switchTab(2, this)" class="nav-btn flex flex-col items-center p-2 text-gray-400"><i class="fas fa-receipt text-xs"></i><span class="text-[7px] uppercase font-bold">Ventes</span></button>
        <button onclick="switchTab(3, this)" class="nav-btn flex flex-col items-center p-2 text-gray-400"><i class="fas fa-shield-alt text-xs"></i><span class="text-[7px] uppercase font-bold">Score</span></button>
        <button onclick="switchTab(4, this)" class="nav-btn flex flex-col items-center p-2 text-gray-400"><i class="fas fa-lightbulb text-xs"></i><span class="text-[7px] uppercase font-bold">Plan</span></button>
        <button onclick="switchTab(5, this)" class="nav-btn flex flex-col items-center p-2 text-gray-400"><i class="fas fa-university text-xs"></i><span class="text-[7px] uppercase font-bold">Banque</span></button>
        <button onclick="switchTab(6, this)" class="nav-btn flex flex-col items-center p-2 text-gray-400"><i class="fas fa-users text-xs"></i><span class="text-[7px] uppercase font-bold">Cercle</span></button>
    </nav>

    <script>
        let totalCA = 0;
        let shares = 0;

        // --- NAVIGATION ---
        function switchTab(num, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('space-' + num).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('text-gray-400');
            });
            element.classList.add('nav-active');
            element.classList.remove('text-gray-400');
        }

        // --- RECONNAISSANCE VOCALE ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) { speech.lang = 'fr-FR'; }

        function listen(btnId, statusId, callback) {
            if(!speech) return alert("Micro non supporté");
            speech.start();
            document.getElementById(btnId).classList.add('recording');
            document.getElementById(statusId).innerText = "MWA$IA ÉCOUTE...";
            
            speech.onresult = (e) => {
                const text = e.results[0][0].transcript;
                callback(text);
                document.getElementById(btnId).classList.remove('recording');
            };
            speech.onerror = () => document.getElementById(btnId).classList.remove('recording');
        }

        // MICRO PAGE 1
        document.getElementById('micBtn1').onclick = () => {
            listen('micBtn1', 'status_1', (text) => {
                const prix = text.match(/\d+/) || ["15000"];
                const mots = text.split(" ");
                const nom = mots[0] || "Produit";
                const ville = mots[mots.length - 1] || "Douala";

                document.getElementById('status_1').innerText = `PRÊT : ${nom} (${prix} F)`;
                document.getElementById('wa_messages').classList.remove('hidden');
                document.getElementById('msg_1').innerText = `🔥 *${nom.toUpperCase()}* à *${prix} FCFA* !`;
                document.getElementById('msg_2').innerText = `📍 Disponible à ${ville}.`;

                const canvas = document.getElementById('visuelCanvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#1a4d2e"; ctx.fillRect(0,0,600,600);
                ctx.fillStyle = "white"; ctx.font = "bold 50px sans-serif"; ctx.textAlign="center";
                ctx.fillText(nom.toUpperCase(), 300, 280);
                ctx.fillText(prix + " FCFA", 300, 360);
                document.getElementById('img_finale').src = canvas.toDataURL();
            });
        };

        // MICRO PAGE 2
        document.getElementById('micBtn2').onclick = () => {
            listen('micBtn2', 'status_2', (text) => {
                const numbers = text.match(/\d+/g);
                if(numbers && numbers.length >= 2) {
                    document.getElementById('quantite').value = numbers[0];
                    document.getElementById('prix').value = numbers[1];
                }
            });
        };

        // --- ACTIONS ---
        document.getElementById('addSaleBtn').onclick = () => {
            const q = parseInt(document.getElementById('quantite').value);
            const p = parseInt(document.getElementById('prix').value);
            if(q && p) {
                totalCA += (q * p);
                document.getElementById('totalVentes').innerText = totalCA.toLocaleString() + " FCFA";
                document.getElementById('scoreFinancier').innerText = Math.round(totalCA * 0.8).toLocaleString() + " FCFA";
                const row = `<tr class="border-b"><td class="py-2">Vente</td><td class="text-right font-bold">${q*p} F</td></tr>`;
                document.getElementById('salesTable').insertAdjacentHTML('afterbegin', row);
                document.getElementById('quantite').value = ""; document.getElementById('prix').value = "";
            }
        };

        document.getElementById('shareBtn').onclick = () => {
            shares++;
            document.getElementById('header_shares').innerText = shares;
            window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(document.getElementById('msg_1').innerText), '_blank');
        };

        // --- TÉLÉCHARGEMENT ---
        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'mwasia-pub.png';
            link.href = document.getElementById('img_finale').src;
            link.click();
        };
    </script>
</body>
</html>
