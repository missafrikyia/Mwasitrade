<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheStartIA - Générateur de Visuels Souverain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-step { border-bottom: 4px solid #8b5cf6; color: #8b5cf6; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Style pour le canvas caché qui sert à la génération */
        #carre_visuel { border: 2px solid #ddd; max-width: 100%; height: auto; display: none;}
        #img_finale { max-width: 100%; height: auto; border-radius: 12px; display: none;}
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <nav class="p-4 bg-white shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-gray-100">
        <h1 class="text-2xl font-bold text-purple-700">SheStartIA</h1>
        <div class="flex gap-4">
            <i class="fas fa-shield-alt text-green-600 text-lg" title="Compliance by Design"></i>
            <i class="fas fa-database text-blue-600 text-lg" title="Données à Francfort"></i>
        </div>
    </nav>

    <div class="bg-white p-3 border-b flex justify-between text-xs font-semibold text-gray-400 overflow-x-auto shadow-inner">
        <span class="px-2">J1</span><span class="px-2">J2</span>
        <span class="active-step px-2 pb-1">J3 : VISUEL</span>
        <span class="px-2">J4</span><span class="px-2">J5</span><span class="px-2">J6</span><span class="px-2">J7</span>
    </div>

    <main class="p-4 max-w-lg mx-auto space-y-8">

        <section class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 text-center">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-extrabold text-gray-800">1. Décrivez votre Pagne</h2>
                <i class="fas fa-info-circle text-gray-400" title="Exemple: 'Vends Pagne Wax, 15000 FCFA, Douala, 699123456'"></i>
            </div>
            
            <p class="text-sm text-gray-600 mb-6 italic bg-gray-50 p-3 rounded-xl">"Vends Pagne Wax, 15000 FCFA, Douala, 699..."</p>
            
            <button id="micBtn" class="bg-purple-600 text-white w-24 h-24 rounded-full shadow-2xl hover:bg-purple-700 transition-all flex items-center justify-center mx-auto border-4 border-white ring-4 ring-purple-100">
                <i class="fas fa-microphone text-4xl"></i>
            </button>
            <div id="status" class="mt-4 text-base text-purple-700 font-semibold animate-pulse">Cliquez pour parler</div>
            <div id="transcription" class="mt-3 text-xs text-gray-500 bg-gray-100 p-2 rounded invisible"></div>
        </section>

        <section id="section_generation" class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 opacity-50 pointer-events-none transition-opacity duration-500">
            <h2 class="text-xl font-extrabold text-gray-800 mb-6 flex items-center gap-3">
                <i class="fas fa-magic text-yellow-500"></i> 2. Votre Visuel J-3
            </h2>

            <div class="relative bg-gray-50 p-2 rounded-2xl border border-gray-200 mb-6 min-h-[300px] flex items-center justify-center">
                <canvas id="carre_visuel" width="500" height="500"></canvas>
                <img id="img_finale" src="" alt="Visuel généré">
                <div id="loading_gen" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 bg-gray-50/90 rounded-2xl hidden">
                    <i class="fas fa-spinner fa-spin text-4xl text-purple-600 mb-3"></i>
                    <p class="text-sm text-purple-800 font-medium">Génération souveraine en cours...</p>
                </div>
            </div>

            <button id="shareBtn" class="w-full bg-green-500 text-white py-4 rounded-xl text-lg font-bold flex items-center justify-center gap-3 shadow-md hover:bg-green-600 transition disabled:opacity-50" disabled>
                <i class="fab fa-whatsapp text-2xl"></i> Partager sur WhatsApp
            </button>
            <p class="text-[11px] text-gray-400 text-center mt-3">Les données de vente sont enregistrées à Francfort.</p>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center glass shadow-lg">
        <button class="text-purple-600 flex flex-col items-center">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[11px] font-medium">Accueil</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-comments text-lg"></i>
            <span class="text-[11px] font-medium">Messagerie</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center hover:text-purple-500">
            <i class="fas fa-chart-line text-lg"></i>
            <span class="text-[11px] font-medium">Ventes</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[11px] font-medium">Réglages</span>
        </button>
    </div>

    <script>
        // --- ÉLÉMENTS HTML ---
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const transcriptionDiv = document.getElementById('transcription');
        const sectionGen = document.getElementById('section_generation');
        const canvas = document.getElementById('carre_visuel');
        const imgFinale = document.getElementById('img_finale');
        const loadingGen = document.getElementById('loading_gen');
        const shareBtn = document.getElementById('shareBtn');
        const ctx = canvas.getContext('2d');

        // --- CONFIGURATION RECONNAISSANCE VOCALE (Web Speech API) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            status.innerText = "Désolé, votre navigateur ne supporte pas le micro.";
            micBtn.disabled = true;
            micBtn.classList.add('opacity-50');
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR'; // Langue : Français
            recognition.continuous = false;
            recognition.interimResults = false;

            // --- GESTION DU CLIC SUR LE MICRO ---
            micBtn.onclick = () => {
                recognition.start();
                status.innerText = "Écoute en cours... Parlez maintenant.";
                micBtn.classList.add('animate-pulse', 'bg-red-500', 'ring-red-100');
                transcriptionDiv.classList.add('invisible');
                // Réinitialiser l'image précédente
                imgFinale.style.display = 'none';
                shareBtn.disabled = true;
                sectionGen.classList.add('opacity-50', 'pointer-events-none');
            };

            // --- RÉSULTAT DE LA RECONNAISSANCE VOCALE ---
            recognition.onresult = (event) => {
                const textOutput = event.results[0][0].transcript;
                micBtn.classList.remove('animate-pulse', 'bg-red-500', 'ring-red-100');
                status.innerText = "Analyse terminée.";
                transcriptionDiv.innerText = `Vous avez dit : "${textOutput}"`;
                transcriptionDiv.classList.remove('invisible');

                // Analyser le texte pour extraire les données
                const donnees = extraireDonnees(textOutput);
                
                // Activer la section de génération
                sectionGen.classList.remove('opacity-50', 'pointer-events-none');
                
                // Lancer la génération du visuel
                genererVisuelPagne(donnees);
            };

            recognition.onerror = (event) => {
                status.innerText = "Erreur de micro. Réessayez.";
                micBtn.classList.remove('animate-pulse', 'bg-red-500', 'ring-red-100');
                console.error(event.error);
            };

            recognition.onend = () => {
                if (status.innerText === "Écoute en cours... Parlez maintenant.") {
                    status.innerText = "Cliquez pour parler";
                    micBtn.classList.remove('animate-pulse', 'bg-red-500', 'ring-red-100');
                }
            };
        }

        // --- FONCTION D'ANALYSE DE TEXTE (NLP Simplifié) ---
        function extraireDonnees(texte) {
            // Mots-clés pour le produit
            const produits = ["pagne", "wax", "kita", "tissu"];
            let produitTrouve = produits.find(p => texte.toLowerCase().includes(p)) || "Produit";
            produitTrouve = produitTrouve.charAt(0).toUpperCase() + produitTrouve.slice(1); // Majuscule

            // Recherche du prix (chiffres suivis de fcfa ou f)
            const regexPrix = /(\d+)\s*(fcfa|f)/i;
            const matchPrix = texte.match(regexPrix);
            const prixTrouve = matchPrix ? `${matchPrix[1]} FCFA` : "Prix à discuter";

            // Recherche de la ville (après 'à' ou 'douala/abidjan' directement)
            const villes = ["douala", "yaoundé", "abidjan", "dakar", "bamako", "ouagadougou"];
            let villeTrouvee = villes.find(v => texte.toLowerCase().includes(v)) || "Ville non précisée";
            villeTrouvee = villeTrouvee.charAt(0).toUpperCase() + villeTrouvee.slice(1);

            // Recherche du numéro (suite de chiffres longue)
            const regexNumero = /(\d{8,14})/; // Entre 8 et 14 chiffres
            const matchNumero = texte.match(regexNumero);
            const numeroTrouve = matchNumero ? matchNumero[1] : "Contact non fourni";

            return {
                produit: produitTrouve,
                prix: prixTrouve,
                ville: villeTrouvee,
                numero: numeroTrouve
            };
        }

        // --- FONCTION DE GÉNÉRATION DE VISUEL (Canvas Local) ---
        function genererVisuelPagne(donnees) {
            loadingGen.classList.remove('hidden');
            imgFinale.style.display = 'none';

            // Simuler un temps de génération (1.5s)
            setTimeout(() => {
                // 1. Fond : Blanc et Rose
                // Moitié gauche rose
                ctx.fillStyle = '#fdf2f8'; // pink-50
                ctx.fillRect(0, 0, canvas.width / 2, canvas.height);
                // Moitié droite blanche
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(canvas.width / 2, 0, canvas.width / 2, canvas.height);

                // 2. Titre et Style
                ctx.fillStyle = '#8b5cf6'; // purple-600
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('SheStartIA', canvas.width / 2, 60);

                ctx.fillStyle = '#1f2937'; // gray-800
                ctx.font = 'bold 32px sans-serif';
                ctx.fillText(`Vente de ${donnees.produit}`, canvas.width / 2, 120);

                // 3. Cadre Photo (Simulé)
                ctx.strokeStyle = '#e5e7eb'; // gray-200
                ctx.lineWidth = 4;
                ctx.strokeRect(canvas.width/2 - 150, 160, 300, 200);
                
                ctx.fillStyle = '#9ca3af'; // gray-400
                ctx.font = 'italic 20px sans-serif';
                ctx.fillText('[Photo du Pagne]', canvas.width / 2, 270);

                // 4. Informations de Vente
                ctx.fillStyle = '#111827'; // gray-900
                ctx.font = '30px sans-serif';
                ctx.textAlign = 'left';
                const startX = canvas.width / 2 - 150;
                ctx.fillText(`Prix : ${donnees.prix}`, startX, 400);
                ctx.fillText(`Ville : ${donnees.ville}`, startX, 440);
                
                ctx.fillStyle = '#059669'; // green-600
                ctx.font = 'bold 28px sans-serif';
                ctx.fillText(`Contact : ${donnees.numero}`, startX, 480);

                // Convertir le Canvas en Image et l'afficher
                const dataUrl = canvas.toDataURL('image/png');
                imgFinale.src = dataUrl;
                imgFinale.style.display = 'block';
                loadingGen.classList.add('hidden');
                
                // Activer le bouton de partage
                shareBtn.disabled = false;
                
                // Stocker les données pour le partage
                shareBtn.dataset.numero = donnees.numero;
                shareBtn.dataset.textePartage = `Regardez mon nouveau ${donnees.produit} à ${donnees.prix} ! Ville : ${donnees.ville}. Contactez-moi : ${donnees.numero}`;

            }, 1500); // Temps de pause pour simuler la génération
        }

        // --- GESTION DU PARTAGE RÉEL SUR WHATSAPP ---
        shareBtn.onclick = () => {
            const numero = shareBtn.dataset.numero;
            const textePartage = encodeURIComponent(shareBtn.dataset.textePartage);
            
            // Créer le lien wa.me
            const urlWhatsApp = `https://wa.me/${numero}?text=${textePartage}`;
            
            // Ouvrir WhatsApp dans un nouvel onglet
            window.open(urlWhatsApp, '_blank');
        };

    </script>
</body>
</html>
