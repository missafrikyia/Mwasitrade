<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheStartIA - Dashboard Professionnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-step { border-bottom: 4px solid #8b5cf6; color: #8b5cf6; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #carre_visuel { display: none; }
        #img_finale { max-width: 100%; height: auto; border-radius: 12px; display: none; margin: 0 auto; border: 1px solid #eee;}
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-gray-900">

    <nav class="p-4 bg-white shadow-sm sticky top-0 z-50 flex justify-between items-center border-b">
        <h1 class="text-2xl font-bold text-purple-700">SheStartIA</h1>
        <div class="flex gap-4">
            <i class="fas fa-shield-alt text-green-600" title="Compliance by Design"></i>
            <i class="fas fa-database text-blue-600" title="Données à Francfort"></i>
        </div>
    </nav>

    <div class="bg-white p-3 border-b flex justify-between text-xs font-semibold text-gray-400 overflow-x-auto shadow-inner">
        <span class="px-2">J1</span><span class="px-2">J2</span>
        <span class="active-step px-2 pb-1 text-purple-600 font-bold">J3 : VISUEL</span>
        <span class="px-2">J4</span><span class="px-2">J5</span><span class="px-2">J6</span><span class="px-2">J7</span>
    </div>

    <main class="p-4 max-w-lg mx-auto space-y-6">

        <section class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 text-center">
            <h2 class="text-lg font-bold mb-2">Décrivez votre produit</h2>
            <p class="text-[11px] text-gray-500 mb-6 italic">"Vends tomates, 2000 FCFA, Douala, 699..."</p>
            
            <button id="micBtn" class="bg-purple-600 text-white w-20 h-20 rounded-full shadow-xl hover:bg-purple-700 transition-all flex items-center justify-center mx-auto border-4 border-white ring-4 ring-purple-50">
                <i class="fas fa-microphone text-3xl"></i>
            </button>
            <div id="status" class="mt-4 text-sm text-purple-700 font-bold uppercase tracking-wide">Cliquez pour parler</div>
            <div id="transcription" class="mt-2 text-[10px] text-gray-400 invisible italic"></div>
        </section>

        <section id="section_generation" class="bg-white p-5 rounded-3xl shadow-md border border-gray-100 opacity-40 pointer-events-none transition-all duration-500">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-magic text-yellow-500"></i> Votre Kit de Lancement
            </h3>

            <div class="space-y-4">
                <div class="relative bg-gray-50 aspect-square rounded-2xl flex items-center justify-center overflow-hidden border">
                    <canvas id="carre_visuel" width="500" height="500"></canvas>
                    <img id="img_finale" src="" alt="Visuel Publicitaire">
                    <div id="loading_gen" class="absolute inset-0 flex flex-col items-center justify-center bg-white/90 hidden">
                        <i class="fas fa-sync-alt fa-spin text-2xl text-purple-600 mb-2"></i>
                        <p class="text-[10px] font-bold">Création du visuel...</p>
                    </div>
                </div>

                <div id="preview_texte" class="bg-purple-50 p-3 rounded-xl text-[11px] text-purple-800 border border-purple-100 italic">
                    En attente de votre annonce...
                </div>
                
                <div class="flex gap-2">
                    <button id="downloadBtn" class="flex-1 bg-gray-800 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2" disabled>
                        <i class="fas fa-download"></i> Enregistrer
                    </button>
                    <button id="shareBtn" class="flex-1 bg-green-500 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-sm" disabled>
                        <i class="fab fa-whatsapp text-lg"></i> Partager
                    </button>
                </div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-3xl shadow-md border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700">Mes Ventes</h3>
                <span class="text-purple-600 font-extrabold text-lg">45.000 FCFA</span>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                    <span class="text-xs text-gray-600">Pagne Kita - Abidjan</span>
                    <span class="text-xs font-bold text-green-600">+15.000</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                    <span class="text-xs text-gray-600">Wax VIP - Douala</span>
                    <span class="text-xs font-bold text-green-600">+30.000</span>
                </div>
            </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center glass shadow-lg">
        <button class="text-purple-600 flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[10px]">Accueil</span></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-comments"></i><span class="text-[10px]">Messages</span></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-chart-line"></i><span class="text-[10px]">Ventes</span></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-cog"></i><span class="text-[10px]">Réglages</span></button>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const sectionGen = document.getElementById('section_generation');
        const canvas = document.getElementById('carre_visuel');
        const imgFinale = document.getElementById('img_finale');
        const loadingGen = document.getElementById('loading_gen');
        const shareBtn = document.getElementById('shareBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewTexte = document.getElementById('preview_texte');
        const ctx = canvas.getContext('2d');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';

            micBtn.onclick = () => {
                recognition.start();
                status.innerText = "Écoute en cours...";
                micBtn.classList.add('animate-pulse', 'bg-red-500');
            };

            recognition.onresult = (event) => {
                const textOutput = event.results[0][0].transcript;
                micBtn.classList.remove('animate-pulse', 'bg-red-500');
                status.innerText = "Traitement...";
                
                const data = parseAnalyse(textOutput);
                sectionGen.classList.remove('opacity-40', 'pointer-events-none');
                generateProVisuel(data);
            };
        }

        // ANALYSE MULTI-PRODUITS
        function parseAnalyse(text) {
            const t = text.toLowerCase();
            let cat = "divers";
            if(t.includes("pagne") || t.includes("wax")) cat = "pagne";
            else if(t.includes("tomate") || t.includes("légume") || t.includes("fruit")) cat = "legumes";
            else if(t.includes("bijou") || t.includes("collier") || t.includes("or")) cat = "bijoux";
            else if(t.includes("vêtement") || t.includes("habit") || t.includes("robe")) cat = "mode";

            return {
                nom: (t.split("vends")[1] || t).split(",")[0].trim(),
                categorie: cat,
                prix: (text.match(/\d+/)) ? text.match(/\d+/)[0] + " FCFA" : "Prix à discuter",
                ville: ["douala", "abidjan", "dakar", "yaoundé", "bamako", "conakry"].find(v => t.includes(v)) || "S/O",
                tel: (text.match(/\d{8,}/)) ? text.match(/\d{8,}/)[0] : "Contact"
            };
        }

        // GÉNÉRATION AVEC BASE DE COULEURS/IMAGES
        function generateProVisuel(d) {
            loadingGen.classList.remove('hidden');
            imgFinale.style.display = 'none';
            
            setTimeout(() => {
                const themes = {
                    pagne: { bg: "#fdf2f8", text: "#86198f" },
                    legumes: { bg: "#f0fdf4", text: "#166534" },
                    bijoux: { bg: "#fff7ed", text: "#9a3412" },
                    mode: { bg: "#eff6ff", text: "#1e40af" },
                    divers: { bg: "#f8fafc", text: "#1e293b" }
                };
                const theme = themes[d.categorie];

                // Fond
                ctx.fillStyle = theme.bg; ctx.fillRect(0,0,500,500);
                
                // Header Branding
                ctx.fillStyle = "#8b5cf6"; ctx.font = "bold 32px sans-serif"; ctx.textAlign="center";
                ctx.fillText("SheStartIA", 250, 60);

                // Cadre Produit (Ici on pourrait charger une image fixe)
                ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 2;
                ctx.strokeRect(50, 100, 400, 220);
                ctx.fillStyle = "#94a3b8"; ctx.font = "italic 18px sans-serif";
                ctx.fillText("[ Photo de " + d.nom + " ]", 250, 220);

                // Détails Vente
                ctx.textAlign = "left";
                ctx.fillStyle = "#1e293b"; ctx.font = "bold 28px sans-serif";
                ctx.fillText(d.nom.toUpperCase(), 50, 370);
                
                ctx.font = "24px sans-serif";
                ctx.fillText("Prix: " + d.prix, 50, 410);
                ctx.fillText("Ville: " + d.ville, 50, 450);
                
                ctx.fillStyle = "#16a34a"; ctx.font = "bold 26px sans-serif";
                ctx.fillText("📞 " + d.tel, 50, 490);

                // Finalisation
                imgFinale.src = canvas.toDataURL();
                imgFinale.style.display = 'block';
                loadingGen.classList.add('hidden');
                status.innerText = "Visuel Prêt !";
                
                const msg = `Bonjour ! Je vends : ${d.nom}. Prix : ${d.prix}. Ville : ${d.ville}. Contactez-moi : ${d.tel}`;
                previewTexte.innerText = msg;
                
                // Activation Boutons
                shareBtn.disabled = false;
                downloadBtn.disabled = false;
                
                shareBtn.onclick = () => {
                    let finalNum = d.tel;
                    if(!finalNum.startsWith('+')) finalNum = "237" + finalNum; // Par défaut Cameroun
                    window.open(`https://api.whatsapp.com/send?phone=${finalNum}&text=${encodeURIComponent(msg)}`, '_blank');
                };

                downloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `pub-${d.nom}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                };
            }, 1000);
        }
    </script>
</body>
</html>
