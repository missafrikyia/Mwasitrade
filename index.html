<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SheStartIA - Parcours 7J</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #visuel { margin-top: 20px; max-width: 300px; }
  input, select, button { margin-top: 10px; display: block; padding: 5px; }
</style>
</head>
<body>

<h1>Bienvenue chez SheStartIA</h1>

<div id="jour1">
  <p>Choisis ton activité :</p>
  <select id="activitySelect">
    <option value="">-- Sélectionner --</option>
    <option value="Jus naturels">Jus naturels</option>
    <option value="Vente de pagnes">Vente de pagnes</option>
    <option value="Yaourt maison">Yaourt maison</option>
    <option value="Coiffeuse à domicile">Coiffeuse à domicile</option>
    <option value="Chips plantain">Chips plantain</option>
  </select>
  <button onclick="startDay1()">Valider</button>
</div>

<div id="jour1Questions" style="display:none;">
  <p id="qText">Réponds en 3 lignes :</p>
  <input type="text" id="q1" placeholder="1) Où (ville/quartier) ?">
  <input type="text" id="q2" placeholder="2) À qui (type de cliente) ?">
  <input type="text" id="q3" placeholder="3) Ton budget de départ (FCFA) ?">
  <button onclick="submitDay1()">Suivant</button>
</div>

<div id="jour3Visuel" style="display:none;">
  <h2>Ton visuel est prêt !</h2>
  <img id="visuel" src="" alt="Visuel activité">
  <p>Tu peux <a id="downloadLink" href="" download>Télécharger le visuel</a></p>
  <p><a id="whatsappLink" href="" target="_blank">Partager sur WhatsApp</a></p>
</div>

<script>
let userData = {};

const activityImages = {
  "Jus naturels": "png/jus.png",
  "Vente de pagnes": "png/pagne.png",
  "Yaourt maison": "png/yaourt.png",
  "Coiffeuse à domicile": "png/coiffure.png",
  "Chips plantain": "png/chips plantain.png"
};

function startDay1() {
  const act = document.getElementById('activitySelect').value;
  if (!act) { alert("Sélectionne une activité !"); return; }
  userData.activity = act;
  document.getElementById('jour1').style.display = 'none';
  document.getElementById('jour1Questions').style.display = 'block';
}

function submitDay1() {
  userData.city = document.getElementById('q1').value;
  userData.clientType = document.getElementById('q2').value;
  userData.budget = document.getElementById('q3').value;

  if(!userData.city || !userData.clientType || !userData.budget) {
    alert("Remplis toutes les questions !");
    return;
  }

  // Afficher le visuel au jour 3
  const imgSrc = activityImages[userData.activity];
  document.getElementById('visuel').src = imgSrc;
  document.getElementById('downloadLink').href = imgSrc;

  const whatsappText = `Commande rapide : ${userData.activity} (${userData.city}) – Budget : ${userData.budget}.`;
  const whatsappURL = `https://wa.me/?text=${encodeURIComponent(whatsappText)}`;
  document.getElementById('whatsappLink').href = whatsappURL;

  document.getElementById('jour1Questions').style.display = 'none';
  document.getElementById('jour3Visuel').style.display = 'block';
}
</script>

</body>
</html>
