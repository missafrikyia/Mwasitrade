<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine MwasiTrade</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1A1A1A; }
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; text-align: center; }
        .top-bar { background: var(--dark); color: white; padding: 15px; font-size: 10px; letter-spacing: 2px; }
        .product-card { padding: 20px; max-width: 500px; margin: 0 auto; }
        .info-box { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        h1 { font-size: 24px; margin: 5px 0; color: var(--dark); }
        .price { font-size: 32px; color: var(--gold); font-weight: 900; }
        .city { color: #888; font-style: italic; margin-bottom: 20px; }
        .btn-contact { 
            background: #25D366; color: white; border: none; padding: 20px; 
            width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px; 
            cursor: pointer; text-decoration: none; display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar">PRODUIT VÉRIFIÉ PAR MWASITRADE</div>

    <div class="product-card">
        <div style="background: var(--dark); padding: 40px; border-radius: 20px; color: white; border: 4px solid var(--gold);">
            <h2 id="viewName" style="font-size: 40px;">PRODUIT</h2>
            <div id="viewPrice" style="font-size: 50px; color: var(--gold); font-weight: 900;">PRIX</div>
            <div id="viewCity" style="font-size: 20px; margin-top: 10px;">VILLE</div>
        </div>

        <div class="info-box">
            <p>Cette entrepreneure fait partie du programme <b>SheStartIA</b> au Bénin.</p>
            <button class="btn-contact" onclick="trackAndChat()">
                💬 CONTACTER POUR ACHETER
            </button>
        </div>
    </div>

    <script>
        // Récupération des infos dans le lien
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Produit";
        const price = params.get('price') || "Sur demande";
        const city = params.get('city') || "Bénin";

        document.getElementById('viewName').innerText = name.toUpperCase();
        document.getElementById('viewPrice').innerText = price.includes("FCFA") ? price : price + " FCFA";
        document.getElementById('viewCity').innerText = "📍 " + city.toUpperCase();

        function trackAndChat() {
            // MÉTRIQUE : Ici on pourrait envoyer un signal à un compteur
            console.log("Métrique : Clic de commande pour " + name);
            
            // ACTION : Redirection vers la discussion réelle
            const msg = encodeURIComponent(`Bonjour ! Je suis intéressée par votre produit *${name}* (${price}) vu sur MwasiTrade.`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
